<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CA Nature Tracker — Regions</title>
<link rel="icon" type="image/png" href="spanishshawl_favicon.png">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --ink:#1e2820;--ink-mid:#4a5548;--ink-light:#8a9488;
  --cream:#f8f6f1;--white:#ffffff;
  --border:rgba(30,40,32,0.10);--border-strong:rgba(30,40,32,0.20);
  --shadow:0 1px 8px rgba(30,40,32,0.07);--shadow-hover:0 5px 24px rgba(30,40,32,0.13);
  --radius:14px;--radius-sm:8px;
}
.cat-lizards           {--c1:#9AA65A;--c2:#C6D29A;--c3:#E8F0D4;--cd:#5a6a32;}
.cat-mammals           {--c1:#8A7362;--c2:#BBA99B;--c3:#E8DDD4;--cd:#4e3f34;}
.cat-butterflies       {--c1:#8B6E98;--c2:#C5B3D6;--c3:#EAE3F2;--cd:#5a4268;}
.cat-frogs-toads       {--c1:#6E8F5E;--c2:#A7C39A;--c3:#D8EDD0;--cd:#3e5e30;}
.cat-flowering-plants  {--c1:#A16B7A;--c2:#CDA2AD;--c3:#F0DDE2;--cd:#6a3a48;}
.cat-sea-stars         {--c1:#C46D48;--c2:#E29A7A;--c3:#F5DDD0;--cd:#7a3e20;}
.cat-birds             {--c1:#C46D48;--c2:#E29A7A;--c3:#F5DDD0;--cd:#7a3e20;}
.cat-snakes            {--c1:#C2A98B;--c2:#E1D3BB;--c3:#F2EBD8;--cd:#6a5840;}
.cat-newts-salamanders {--c1:#4F7F72;--c2:#9EC9BF;--c3:#D0EDE8;--cd:#264f45;}
.cat-moths             {--c1:#64686C;--c2:#B0B3B6;--c3:#E2E4E6;--cd:#36393c;}
.cat-turtles           {--c1:#4B7E8E;--c2:#93C1CC;--c3:#D0E8EE;--cd:#224e5e;}
.cat-nudibranchs       {--c1:#D1A53B;--c2:#EBCB77;--c3:#F7EBC8;--cd:#8a6410;}
.cat-dragonflies       {--c1:#5D6A9E;--c2:#A5AED6;--c3:#DDE0F2;--cd:#323e72;}
.cat-damselflies       {--c1:#6E8FB8;--c2:#B1C7DF;--c3:#DAE9F4;--cd:#3a5e88;}
.cat-default           {--c1:#64686C;--c2:#B0B3B6;--c3:#E2E4E6;--cd:#36393c;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--cream);color:var(--ink);display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.header{background:var(--ink);padding:18px 28px;display:flex;align-items:center;gap:14px;flex-shrink:0;}
.header h1{font-family:Georgia,"Times New Roman",serif;font-size:20px;font-weight:400;color:#9aa87a;white-space:nowrap;}
.hcounts{font-size:11px;color:#6a7a68;letter-spacing:.04em;text-transform:uppercase;flex:1;}
.hdr-toggle{display:flex;gap:3px;background:rgba(0,0,0,0.2);border-radius:8px;padding:3px;}
.htog{font-size:11px;font-weight:500;padding:5px 12px;border-radius:6px;border:none;background:transparent;color:#7aA07a;cursor:pointer;letter-spacing:.02em;transition:all .15s;}
.htog:hover{background:rgba(255,255,255,0.07);color:#a8c4a0;}
.htog.on{background:rgba(255,255,255,0.12);color:#c4dcc0;}
.nav-btn{font-size:11px;font-weight:500;padding:5px 12px;border-radius:99px;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.7);cursor:pointer;white-space:nowrap;transition:all .15s;letter-spacing:.02em;text-decoration:none;display:inline-block;font-family:inherit;}
.nav-btn:hover{background:rgba(255,255,255,0.16);color:#fff;border-color:rgba(255,255,255,0.35);}
.toolbar{background:var(--white);border-bottom:1px solid var(--border);padding:0 28px;flex-shrink:0;}
.trow{display:flex;flex-wrap:wrap;gap:7px;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);}
.trow:last-child{border-bottom:none;}
.fl{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.07em;color:var(--ink-light);white-space:nowrap;margin-right:2px;}
.cscroll{display:flex;gap:5px;flex-wrap:wrap;}
.chip{font-size:11px;font-weight:500;padding:3px 11px;border-radius:99px;border:1px solid var(--border-strong);background:var(--cream);color:var(--ink-mid);cursor:pointer;transition:all .15s;white-space:nowrap;font-family:inherit;}
.chip:hover{border-color:#A8947E;color:#8a7060;}
.chip.on{background:#A8947E;color:#fff;border-color:#A8947E;}
.body-wrap{display:flex;flex:1;overflow:hidden;min-height:0;}
.map-panel{width:380px;flex-shrink:0;border-right:1px solid var(--border);background:var(--white);display:flex;flex-direction:column;overflow:hidden;}
.map-canvas-wrap{padding:10px 10px 0;flex-shrink:0;}
.map-canvas-wrap canvas{display:block;width:100%;height:auto;aspect-ratio:1060/1188;cursor:crosshair;border-radius:var(--radius-sm);}
.map-footer{padding:8px 10px 16px;flex:1;overflow-y:auto;}
.region-detail{height:100%;}
.rd-placeholder{font-size:11px;color:var(--ink-light);font-style:italic;}
.rd-name{font-family:Georgia,"Times New Roman",serif;font-size:13px;font-weight:600;color:var(--ink);margin-bottom:8px;line-height:1.3;}
.rd-section{margin-bottom:8px;}
.rd-label{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-light);margin-bottom:3px;}
.rd-text{font-size:10.5px;color:var(--ink-mid);line-height:1.5;}
.map-label{font-size:11px;color:var(--ink-mid);min-height:16px;line-height:1.4;}
.map-label strong{color:var(--ink);}
.map-clear{margin-top:5px;font-size:11px;color:var(--ink-light);background:none;border:1px solid var(--border-strong);border-radius:99px;padding:2px 9px;cursor:pointer;display:none;font-family:inherit;}
.map-clear:hover{color:var(--ink);border-color:var(--ink-mid);}
.tile-panel{flex:1;overflow-y:auto;padding:14px 18px 60px;min-width:0;}
.rbar{padding:0 0 10px;font-size:11px;color:var(--ink-light);display:flex;align-items:center;gap:10px;}
.rbar strong{color:var(--ink);}
.mini-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:11px;}
.none-msg{grid-column:1/-1;text-align:center;padding:50px 20px;color:var(--ink-light);}
.none-msg h3{font-family:Georgia,"Times New Roman",serif;font-size:17px;font-weight:400;font-style:italic;margin-bottom:6px;color:var(--ink-mid);}
.none-msg p{font-size:12px;line-height:1.5;}
.mini-scene{perspective:800px;cursor:pointer;}
.mini-inner{display:grid;transform-style:preserve-3d;transition:transform .45s cubic-bezier(.4,0,.2,1);box-shadow:var(--shadow);border-radius:10px;}
.mini-scene:hover .mini-inner{box-shadow:var(--shadow-hover);}
.mini-scene.flipped .mini-inner{transform:rotateY(180deg);}
.mini-face{grid-area:1/1;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:10px;overflow:hidden;border:.5px solid rgba(0,0,0,.12);display:flex;flex-direction:column;background:var(--white);}
.mini-back{transform:rotateY(180deg);}
.mini-hdr{padding:6px 8px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;background:var(--c2);}
.mini-name{font-size:10.5px;font-weight:500;color:var(--cd);line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;flex:1;padding-right:4px;}
.mini-chk{width:17px;height:17px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;color:#fff;background:var(--c1);flex-shrink:0;}
.mini-chk.unseen{background:rgba(255,255,255,.55);border:1.5px solid var(--c1);color:transparent;}
.mini-photo{aspect-ratio:1/1;overflow:hidden;flex-shrink:0;}
.mini-photo img{width:100%;height:100%;object-fit:cover;display:block;}
.mini-initials{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:var(--c1);font-size:20px;font-weight:500;color:rgba(255,255,255,.9);}
.mini-obs{padding:5px 8px;display:flex;align-items:center;gap:4px;flex-shrink:0;background:var(--c3);}
.mini-reg-txt{font-size:10px;font-weight:500;color:var(--cd);white-space:nowrap;}
.mini-peak-pill{font-size:10px;font-weight:500;color:var(--cd);background:var(--c2);border-radius:10px;padding:1px 6px;line-height:1.4;white-space:nowrap;}
.mini-back-body{flex:1;padding:8px;display:flex;flex-direction:column;gap:6px;background:var(--c3);min-height:0;}
.mini-back-row{display:flex;justify-content:space-between;align-items:center;}
.mini-back-lbl{font-weight:500;font-size:10px;color:var(--cd);}
.mini-back-val{font-size:10.5px;color:var(--cd);opacity:.8;}
.mini-divider{border:none;border-top:.5px solid rgba(0,0,0,.12);margin:0;}
.mini-notes{font-size:9.5px;color:var(--cd);opacity:.85;line-height:1.4;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden;}
</style>
</head>
<body>

<div class="header">
  <h1>California Nature Tracker: Regions</h1>
  <div class="hdr-toggle">
    <button class="htog on" id="tog-all"  onclick="setToggle('all')">All</button>
    <button class="htog"    id="tog-seen" onclick="setToggle('seen')">Observed</button>
    <button class="htog"    id="tog-unseen" onclick="setToggle('unseen')">Targets</button>
  </div>
  <a href="index.html" class="nav-btn" style="margin-left:auto">&#8592; Home</a>
  <button class="nav-btn" onclick="document.getElementById('fi').click()">&#8593; Load CSV</button>
  <input type="file" id="fi" accept=".csv" style="display:none">
</div>

<div class="toolbar" id="toolbar">
  <div class="trow">
    <span class="fl">Category</span>
    <div class="cscroll" id="cat-chips">
      <button class="chip on" data-cat="__a__">All</button>
    </div>
  </div>
  <div class="trow">
    <span class="fl">Region</span>
    <div class="cscroll" id="region-chips"></div>
  </div>
  <div class="trow">
    <span class="fl">Regional Peak</span>
    <div class="cscroll" id="month-chips">
      <button class="chip on" data-m="0">Any</button>
      <button class="chip" data-m="1">Jan</button>
      <button class="chip" data-m="2">Feb</button>
      <button class="chip" data-m="3">Mar</button>
      <button class="chip" data-m="4">Apr</button>
      <button class="chip" data-m="5">May</button>
      <button class="chip" data-m="6">Jun</button>
      <button class="chip" data-m="7">Jul</button>
      <button class="chip" data-m="8">Aug</button>
      <button class="chip" data-m="9">Sep</button>
      <button class="chip" data-m="10">Oct</button>
      <button class="chip" data-m="11">Nov</button>
      <button class="chip" data-m="12">Dec</button>
    </div>
  </div>
</div>

<div class="body-wrap" id="body-wrap">
  <div class="map-panel">
    <div class="map-canvas-wrap">
      <canvas id="c" width="1060" height="1188"></canvas>
    </div>
    <div class="map-footer">
      <div class="region-detail" id="region-detail">
        <div class="rd-placeholder" id="rd-placeholder">Click a region on the map.</div>
        <div class="rd-content" id="rd-content" style="display:none">
          <div class="rd-name" id="rd-name"></div>
          <div class="rd-section">
            <div class="rd-label">Makeup</div>
            <div class="rd-text" id="rd-makeup"></div>
          </div>
          <div class="rd-section">
            <div class="rd-label">Key Sites</div>
            <div class="rd-text" id="rd-sites"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="tile-panel" id="tile-panel">
    <div class="rbar" id="rbar" style="display:none"><span id="rtxt"></span></div>
    <div class="mini-grid" id="mini-grid">
      <div class="none-msg">
        <h3>Load your CSV to get started</h3>
        <p>Click <strong>Load CSV</strong> in the header and select your data file.<br>The file needs Region and Regional peak columns.</p>
      </div>
    </div>
  </div>
</div>

<script src="jepson_map.js" onload="initApp()"></script>
<script>
function initApp() {
/* ===== OVERRIDE Jepson toggleRegion for single-select + chip sync ===== */
var _jepsonToggle = toggleRegion;
toggleRegion = function(idx) {
  var wasActive = activeSet.has(idx);
  activeSet.clear();
  if (!wasActive) activeSet.add(idx);
  redraw();
  var code = null;
  for (var i = 0; i < REGIONS.length; i++) {
    if (REGIONS[i].idx === idx) { code = REGIONS[i].code; break; }
  }
  applyRegion(wasActive ? null : code, false);
};

/* ===== LAYOUT ===== */
function positionBodyWrap() { /* flex layout - no positioning needed */ }

/* ===== REGION DATA ===== */
var REGION_INFO = {
  'NCo':  { name: 'North Coast', makeup: 'Full length of the NW coast, from Oregon to Bodega Bay. Mostly coastal prairie, with some coastal marsh, coastal scrub, closed-cone-pine/cypress forest, and grand-fir/Sitka-spruce forest.', sites: 'Crescent City, Arcata, Mendocino, Sonoma Coast State Park' },
  'NCoR': { name: 'North Coast Ranges', makeup: 'Serpentine widespread. Outer part has high rainfall, redwood and mixed evergreen/hardwood. High district has heavy snow, montane and subalpine forests. Inner part has low rainfall, hot/dry summers, chaparral and pine/oak woodland.', sites: 'Mount Lassic, Grouse Mtn, South Fork Mtn, north of Ukiah, west of Russian River' },
  'KR':   { name: 'Klamath Ranges', makeup: 'Old and serpentine-rich. Gradual transition between metamorphic rocks of KR and the mostly sedimentary North Coast Ranges. Exceptional conifer diversity.', sites: 'Trinity Alps, Red Mountain, Marble, Salmon, Scott Bar, Siskiyou, and Trinity Mountains' },
  'CaR':  { name: 'Cascade Ranges', makeup: 'Characterized by volcanics. Foothills in SW are chaparral, blue-oak, foothill-pine. High subregion has ponderosa, montane fir, lodgepole pine.', sites: 'Mt Shasta, Lassen, Shasta-Trinity Forest' },
  'SNF':  { name: 'Sierra Nevada Foothills', makeup: 'Narrow western strip of the Sierras, up to 1500m in the north and 1000m in the south. Bordered on the south by Hwy 58 at Tehachapi pass.', sites: 'Oroville, Auburn, Placerville, Grass Valley, Sonora, Incline, Mariposa, Lake Isabella' },
  'SNH':  { name: 'High Sierra Nevada', makeup: 'From Lassen and Plumas counties to Kern County. Ponderosa, white fir, and sequoia in lower montane; red fir, Jeffrey and lodgepole pine in upper montane; mountain hemlock and whitebark pine in subalpine.', sites: 'Quincy, Truckee, Yosemite, Mammoth Lakes, Kings Canyon, Sequoia' },
  'Teh':  { name: 'Tehachapi Mountain', makeup: 'Small foothill and montane subregion, elevation rarely above 2000m, with floristic elements of all surrounding regions.', sites: 'Tehachapi Mountain Park' },
  'GV':   { name: 'Great Central Valley', makeup: 'Lowland area ending where oak-pine woodlands or mixed hardwood forests begin. Mostly agricultural, but some grasslands, marshes, vernal pools, riparian woodlands, alkali sink vegetation, and strands of valley oak.', sites: 'Sacramento Valley, Carrizo Plain, San Juan Valley, Cuyama Valley' },
  'SnFrB':{ name: 'San Francisco Bay Area', makeup: 'Northern third of Central West, east of Central Coast. Encompasses very wet redwood forests and dry oak/pine woodlands and chaparral.', sites: 'Mount Tam, Santa Cruz Mountains, Mount Diablo, Mount Hamilton' },
  'CCo':  { name: 'Central Coast', makeup: 'Extends along the coast and SF Bay from Bodega Bay to Point Conception. Salt marshes and coastal prairie near SF, coastal scrub in south.', sites: 'Bodega Bay, SF Bay, Monterey, Morro Bay, San Luis Obispo coasts' },
  'SCoR': { name: 'South Coast Ranges', makeup: 'Hwy 101 divides Inner and Outer districts. Outer: redwood, mixed-evergreen, oak forests. Inner: blue-oak, foothill-pine, juniper, chaparral, desert scrub.', sites: 'Sierra de Salinas, Santa Lucia Range, San Rafael Mountains, San Benito Mountain, Gabilan Range, Temblor and Caliente Ranges' },
  'ChI':  { name: 'Channel Islands', makeup: 'Eight islands off the coast of SoCal. Northern Islands most related to Santa Monica Mountains. Southern Islands are more isolated and more diverse.', sites: 'San Miguel, Santa Rosa, Santa Cruz, Anacapa, Santa Barbara, Santa Catalina, San Clemente, San Nicolas' },
  'SCo':  { name: 'South Coast', makeup: 'Along the Pacific Coast from Point Conception to Mexico. Hotter and drier than other coastal regions. Coastal-sage scrub and chaparral predominated before urbanization.', sites: 'Los Angeles, San Diego, Riverside, San Bernardino, San Gorgonio Pass' },
  'TR':   { name: 'Transverse Ranges', makeup: 'Mountains stretching east-west from the coast to San Gorgonio Pass. Hotter, higher, and drier to the east. Lower elev: chaparral; higher: dry montane forests of white fir, incense cedar, Jeffrey/sugar/lodgepole pine.', sites: 'Mount Pinos, Santa Ynez Mountains, San Gabriel Mountains, San Bernardino Mountains (San Gorgonio)' },
  'PR':   { name: 'Peninsular Ranges', makeup: 'Southeastern third of SW province. San Jacinto Mountain District has a high level of endemism.', sites: 'Mount Palomar, Santa Ana, Cuyamaca, Santa Rosa, Laguna, Jacumba, Volcan, and San Jacinto mountains' },
  'MP':   { name: 'Modoc Plateau', makeup: 'High plateau (1300–1800m) entirely north of Lake Tahoe. Juniper woodland and sagebrush steppe, with some areas of ponderosa/Jeffrey pine. Includes the Warner Mountains subregion.', sites: 'Warner Mountains (Eagle Peak), Clear Lake, Goose Lake, Modoc National Forest' },
  'SNE':  { name: 'East of Sierra Nevada', makeup: 'South of Lake Tahoe, elevation ranging from 1100m at Owens Lake to 4330m at White Mountain Peak. Mosaic of sagebrush steppe, pinyon/juniper, cottonwood riparian, and patches of Jeffrey pine.', sites: 'Mono Lake, Glass Mountain, Sweetwater Mtn, Owens Lake, White Mountain Peak' },
  'DMoj': { name: 'Mojave Desert', makeup: 'Northern two-thirds of the desert region, with greater temperature ranges and more extreme elevational relief than the Sonoran. Joshua Tree and Mojave yucca are conspicuous here.', sites: 'Joshua Tree, Mojave National Park, Death Valley' },
  'DMtns':{ name: 'Mojave Desert Mountains', makeup: 'Mountains reaching over 1700m support pinyon/juniper woodland vegetation. Panamint, Kingston, Clark, and NY Mountains also support white fir or limber pine.', sites: 'Last Chance Range, Grapevine Mtns, Panamint Range, Coso Range, Argus Range, Kingston Range, Clark Range, Ivanpah, NY Mountains' },
  'DSon': { name: 'Sonoran Desert', makeup: 'California portion of the Colorado Desert. Overall lower, warmer, and floristically distinct from the Mojave. Uniquely includes blue palo verde, ocotillo, chuparosa, and ironwood.', sites: 'Chuckwalla and Whipple mountains, Anza-Borrego, Salton Sea' }
};

var JEPSON_REGIONS = [{"idx":3,"name":"North Coast","code":"NCo","color":"#3f736e"},{"idx":16,"name":"North Coast Ranges","code":"NCoR","color":"#6d9d7a"},{"idx":18,"name":"Klamath Ranges","code":"KR","color":"#8fa26e"},{"idx":1,"name":"Cascade Ranges","code":"CaR","color":"#4f7a5a"},{"idx":14,"name":"Sierra Nevada Foothills","code":"SNF","color":"#93a6bc"},{"idx":13,"name":"High Sierra Nevada","code":"SNH","color":"#797db6"},{"idx":5,"name":"Tehachapi Mountain","code":"Teh","color":"#7c93ae"},{"idx":12,"name":"Great Central Valley","code":"GV","color":"#b7c26b"},{"idx":15,"name":"San Francisco Bay Area","code":"SnFrB","color":"#aaced0"},{"idx":19,"name":"Central Coast","code":"CCo","color":"#769289"},{"idx":17,"name":"South Coast Ranges","code":"SCoR","color":"#9fae9a"},{"idx":8,"name":"Channel Islands","code":"ChI","color":"#61476e"},{"idx":10,"name":"South Coast","code":"SCo","color":"#8e75b0"},{"idx":9,"name":"Transverse Ranges","code":"TR","color":"#c9a5c0"},{"idx":11,"name":"Peninsular Ranges","code":"PR","color":"#b576a6"},{"idx":0,"name":"Modoc Plateau","code":"MP","color":"#d9c3a6"},{"idx":2,"name":"East of Sierra Nevada","code":"SNE","color":"#a69585"},{"idx":4,"name":"Mojave Desert","code":"DMoj","color":"#c9a26d"},{"idx":6,"name":"Mojave Desert Mountains","code":"DMtns","color":"#b86d3d"},{"idx":7,"name":"Sonoran Desert","code":"DSon","color":"#d1a24a"}];

/* ===== BUILD REGION CHIPS ===== */
function buildRegionChips() {
  var container = document.getElementById('region-chips');
  container.innerHTML = '';

  var allBtn = document.createElement('button');
  allBtn.className = 'chip on';
  allBtn.setAttribute('data-region', '__a__');
  allBtn.textContent = 'All';
  allBtn.addEventListener('click', function() { applyRegion(null, true); });
  container.appendChild(allBtn);

  JEPSON_REGIONS.forEach(function(r) {
    var btn = document.createElement('button');
    btn.className = 'chip';
    btn.setAttribute('data-region', r.code);
    btn.setAttribute('data-color', r.color);
    btn.textContent = r.code;
    btn.title = r.name;
    btn.addEventListener('click', function() {
      var isOn = btn.classList.contains('on');
      applyRegion(isOn ? null : r.code, true);
    });
    container.appendChild(btn);
  });
}

function setRegionChipStyles(activeCode) {
  document.querySelectorAll('#region-chips [data-region]').forEach(function(c) {
    var cr = c.getAttribute('data-region');
    var color = c.getAttribute('data-color');
    var isOn = activeCode === null ? cr === '__a__' : cr === activeCode;
    c.classList.toggle('on', isOn);
    if (isOn && color) {
      c.style.background = color;
      c.style.borderColor = color;
      c.style.color = '#fff';
    } else {
      c.style.background = '';
      c.style.borderColor = '';
      c.style.color = '';
    }
  });
}

var activeRegion = null;

function applyRegion(code, syncMap) {
  activeRegion = code;

  // Update region chips
  setRegionChipStyles(code);

  // Update map label and clear button
  if (code) {
    var rObj = null;
    for (var i = 0; i < JEPSON_REGIONS.length; i++) {
      if (JEPSON_REGIONS[i].code === code) { rObj = JEPSON_REGIONS[i]; break; }
    }
    var info = REGION_INFO[code];
    if (info) {
      document.getElementById('rd-name').textContent = info.name;
      document.getElementById('rd-makeup').textContent = info.makeup;
      document.getElementById('rd-sites').textContent = info.sites;
      document.getElementById('rd-placeholder').style.display = 'none';
      document.getElementById('rd-content').style.display = 'block';
    }
    if (syncMap && rObj) {
      activeSet.clear();
      activeSet.add(rObj.idx);
      redraw();
    }
  } else {
    document.getElementById('rd-placeholder').style.display = '';
    document.getElementById('rd-content').style.display = 'none';
    if (syncMap) { activeSet.clear(); redraw(); }
  }
  render();
}

// map-clear listener moved to DOMContentLoaded

/* ===== DATA & FILTERS ===== */
var MONTHS = ['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
var CAT_CLASS = {
  'lizards':'cat-lizards','mammals':'cat-mammals','butterflies':'cat-butterflies',
  'frogs & toads':'cat-frogs-toads','flowering plants':'cat-flowering-plants',
  'flowers':'cat-flowering-plants','sea stars':'cat-sea-stars','birds':'cat-birds',
  'snakes':'cat-snakes','newts & salamanders':'cat-newts-salamanders',
  'salamanders':'cat-newts-salamanders','moths':'cat-moths',
  'turtles & tortoises':'cat-turtles','turtles':'cat-turtles',
  'nudibranchs':'cat-nudibranchs','dragonflies':'cat-dragonflies','damselflies':'cat-damselflies'
};
function getCatClass(cat) { return CAT_CLASS[(cat || '').toLowerCase()] || 'cat-default'; }

var allData = [];
var activeCats = ['__a__'];
var activeMonths = [0];

function normCat(cat) {
  return cat.toLowerCase() === 'flowering plants' ? 'Flowers' : cat;
}

function splitCSVRow(line) {
  var out = [], cur = '', inQ = false;
  for (var i = 0; i < line.length; i++) {
    var ch = line[i];
    if (ch === '"') { inQ = !inQ; }
    else if (ch === ',' && !inQ) { out.push(cur); cur = ''; }
    else { cur += ch; }
  }
  out.push(cur);
  return out;
}

function parseCSV(txt) {
  var lines = txt.split(/\r?\n/);
  if (lines.length < 2) return [];
  var heads = splitCSVRow(lines[0]).map(function(h) { return h.trim().toLowerCase(); });
  function col() {
    var names = Array.prototype.slice.call(arguments);
    for (var n = 0; n < names.length; n++) {
      for (var i = 0; i < heads.length; i++) {
        if (heads[i].indexOf(names[n].toLowerCase()) >= 0) return i;
      }
    }
    return -1;
  }
  function exactCol(name) {
    name = name.toLowerCase();
    for (var i = 0; i < heads.length; i++) {
      if (heads[i].trim() === name) return i;
    }
    return -1;
  }
  function parsePeaks(raw) {
    // "3,4" -> [3,4]; "5" -> [5]; "" -> []
    return (raw || '').split(',').map(function(s) {
      var n = parseInt(s.trim());
      return (n >= 1 && n <= 12) ? n : 0;
    }).filter(function(n) { return n > 0; });
  }
  var iCat=col('category'), iSub=col('subcategory'), iNm=col('name');
  var iSci=col('scientific name'), iDt=col('life list date');
  var iCA=col('ca obsv'), iNo=col('notes');
  var iR1=exactCol('r1'), iR1p=exactCol('r1 peak');
  var iR2=exactCol('r2'), iR2p=exactCol('r2 peak');
  var iR3=exactCol('r3'), iR3p=exactCol('r3 peak');
  var rows = [];
  for (var i = 1; i < lines.length; i++) {
    var c = splitCSVRow(lines[i]);
    var name = iNm >= 0 ? (c[iNm] || '').trim() : '';
    if (!name) continue;
    var dv = iDt >= 0 ? (c[iDt] || '').trim() : '';
    var seen = !!(dv && dv !== '#N/A' && dv !== 'N/A');
    var ca = parseInt(((iCA >= 0 ? c[iCA] : '') || '0').replace(/,/g, '')) || 0;
    // Build regions array [{code, peaks:[]}] — only include non-empty
    var regions = [];
    [[iR1,iR1p],[iR2,iR2p],[iR3,iR3p]].forEach(function(pair) {
      var rcode = pair[0] >= 0 ? (c[pair[0]] || '').trim() : '';
      if (!rcode) return;
      var peaks = pair[1] >= 0 ? parsePeaks(c[pair[1]]) : [];
      regions.push({ code: rcode, peaks: peaks });
    });
    rows.push({
      cat: normCat(iCat >= 0 ? (c[iCat] || '').trim() : ''),
      sub: iSub >= 0 ? (c[iSub] || '').trim() : '',
      name: name, sci: iSci >= 0 ? (c[iSci] || '').trim() : '',
      seen: seen, date: seen ? dv : '', ca: ca,
      regions: regions,
      notes: iNo >= 0 ? (c[iNo] || '').trim() : ''
    });
  }
  return rows;
}

function loadCSV(txt) {
  allData = parseCSV(txt);
  buildCatChips();
  document.getElementById('rbar').style.display = 'flex';
  var seen = allData.filter(function(d) { return d.seen; }).length;
  var _hc = document.getElementById('hc'); if(_hc) _hc.textContent = seen + ' observed &middot; ' + (allData.length - seen) + ' targets';
  render();
}

// File input handler (moved to DOMContentLoaded)

/* ===== CAT CHIPS ===== */
function buildCatChips() {
  var seen = {}, cats = [];
  allData.forEach(function(d) { if (!seen[d.cat]) { seen[d.cat] = true; cats.push(d.cat); } });
  cats.sort();
  var container = document.getElementById('cat-chips');
  container.innerHTML = '';
  var allBtn = document.createElement('button');
  allBtn.className = 'chip' + (activeCats.indexOf('__a__') >= 0 ? ' on' : '');
  allBtn.setAttribute('data-cat', '__a__');
  allBtn.textContent = 'All';
  allBtn.addEventListener('click', function() { toggleCat(allBtn); });
  container.appendChild(allBtn);
  cats.forEach(function(cat) {
    var btn = document.createElement('button');
    btn.className = 'chip' + (activeCats.indexOf(cat) >= 0 ? ' on' : '');
    btn.setAttribute('data-cat', cat);
    btn.textContent = cat;
    btn.addEventListener('click', function() { toggleCat(btn); });
    container.appendChild(btn);
  });
}

function toggleCat(btn) {
  var cat = btn.getAttribute('data-cat');
  if (cat === '__a__') {
    activeCats = ['__a__'];
  } else {
    var idx = activeCats.indexOf(cat);
    if (idx >= 0) { activeCats.splice(idx, 1); }
    else { activeCats = activeCats.filter(function(c) { return c !== '__a__'; }); activeCats.push(cat); }
    if (!activeCats.length) activeCats = ['__a__'];
  }
  document.querySelectorAll('#cat-chips [data-cat]').forEach(function(c) {
    var cv = c.getAttribute('data-cat');
    c.classList.toggle('on', activeCats.indexOf('__a__') >= 0 ? cv === '__a__' : activeCats.indexOf(cv) >= 0);
  });
  render();
}

/* ===== MONTH CHIPS (moved to DOMContentLoaded) ===== */

/* ===== RENDER ===== */
var activeToggle = 'all';
function setToggle(val) {
  activeToggle = val;
  ['all','seen','unseen'].forEach(function(k) {
    var b = document.getElementById('tog-' + k);
    if (b) b.classList.toggle('on', k === val);
  });
  render();
}

function render() {
  var f = allData.filter(function(d) {
    if (activeCats.indexOf('__a__') < 0 && activeCats.indexOf(d.cat) < 0) return false;
    if (activeToggle === 'seen' && !d.seen) return false;
    if (activeToggle === 'unseen' && d.seen) return false;
    // Only show tiles that have at least one region assigned
    if (!d.regions || !d.regions.length) return false;
    // If a region is selected, species must belong to it
    if (activeRegion) {
      var inRegion = d.regions.some(function(r) { return r.code === activeRegion; });
      if (!inRegion) return false;
      // If month filter active, check peaks for the active region
      if (activeMonths.indexOf(0) < 0) {
        var rMatch = null;
        d.regions.forEach(function(r) { if (r.code === activeRegion) rMatch = r; });
        if (!rMatch || !rMatch.peaks.some(function(p) { return activeMonths.indexOf(p) >= 0; })) return false;
      }
    }
    return true;
  });
  f.sort(function(a, b) { return (b.ca || 0) - (a.ca || 0); });
  document.getElementById('rbar').style.display = allData.length ? 'flex' : 'none';
  document.getElementById('rtxt').innerHTML =
    'Showing <strong>' + f.length + '</strong> of ' + allData.filter(function(d){return d.regions&&d.regions.length;}).length + ' species with region data';
  var grid = document.getElementById('mini-grid');
  if (!allData.length) {
    grid.innerHTML = '<div class="none-msg"><h3>Load your CSV to get started</h3><p>Click <strong>Load CSV</strong> in the header.</p></div>';
    return;
  }
  if (!f.length) {
    grid.innerHTML = '<div class="none-msg"><h3>Nothing matches these filters.</h3><p>Try a different region or category.</p></div>';
    return;
  }
  var html = '';
  for (var i = 0; i < f.length; i++) html += makeMiniTile(f[i]);
  grid.innerHTML = html;
}

/* ===== MINI TILE ===== */
function abbrevName(name) {
  if (name.length <= 22) return name;
  var abbrevMap = [
    [/\bNorthwestern\b/g,    'N.W.'],
    [/\bSouthwestern\b/g,    'S.W.'],
    [/\bNorth American\b/g,  'N.A.'],
    [/\bNorthern\b/g,        'N.'],
    [/\bSouthern\b/g,        'S.'],
    [/\bEastern\b/g,         'E.'],
    [/\bWestern\b/g,         'W.'],
    [/\bCalifornia\b/g,      'CA'],
    [/\bCommon\b/g,          'C.'],
    [/\bMountains\b/g,       'Mts.'],
    [/\bMountain\b/g,        'Mt.'],
    [/\bMount\b/g,           'Mt.'],
    [/\bPacific\b/g,         'Pac.'],
    [/\bAmerican\b/g,        'Am.'],
    [/\bGreat\b/g,           'Gr.'],
    [/\bBlack\b/g,           'Bl.'],
    [/\bWhite\b/g,           'Wh.'],
    [/\bSlender\b/g,         'Sl.'],
  ];
  var shortened = name;
  for (var ai = 0; ai < abbrevMap.length; ai++) {
    if (shortened.length <= 22) break;
    shortened = shortened.replace(abbrevMap[ai][0], abbrevMap[ai][1]);
  }
  return shortened;
}

function makeMiniTile(d) {
  var catcl = getCatClass(d.cat);
  var slug = d.name.toLowerCase().replace(/[\u2018\u2019']/g, '').replace(/[^a-z0-9]+/g, '_').replace(/^_|_$/g, '');
  var ini = d.name.split(' ').slice(0, 2).map(function(w) { return (w[0] || '').toUpperCase(); }).join('');
  var chkCl = d.seen ? '' : ' unseen';
  var chkTxt = d.seen ? '&#10003;' : '';
  // Footer: only show region+peaks when a region is selected and this species belongs to it
  var obsRow = '';
  if (activeRegion && d.regions) {
    var rMatch = null;
    d.regions.forEach(function(r) { if (r.code === activeRegion) rMatch = r; });
    if (rMatch) {
      var peakPills = rMatch.peaks.length
        ? rMatch.peaks.map(function(p) { return '<span class="mini-peak-pill">' + MONTHS[p] + '</span>'; }).join('')
        : '<span class="mini-peak-pill">&mdash;</span>';
      obsRow = '<span class="mini-reg-txt">' + rMatch.code + ' peak:</span>' + peakPills;
    }
  }
  var backNotes = d.notes
    ? '<hr class="mini-divider"><div class="mini-back-lbl" style="margin-bottom:2px">Notes</div><div class="mini-notes">' + d.notes + '</div>'
    : '';
  return (
    '<div class="mini-scene ' + catcl + '">' +
      '<div class="mini-inner">' +
        '<div class="mini-face">' +
          '<div class="mini-hdr"><span class="mini-name">' + abbrevName(d.name) + '</span><span class="mini-chk' + chkCl + '">' + chkTxt + '</span></div>' +
          '<div class="mini-photo"><img src="photos/' + slug + '.jpg" onerror="imgFail(this)" data-slug="' + slug + '" style="width:100%;height:100%;object-fit:cover;display:block"><div class="mini-initials" style="display:none">' + ini + '</div></div>' +
          '<div class="mini-obs">' + obsRow + '</div>' +
        '</div>' +
        '<div class="mini-face mini-back">' +
          '<div class="mini-hdr"><span class="mini-name">' + abbrevName(d.name) + '</span><span class="mini-chk' + chkCl + '">' + chkTxt + '</span></div>' +
          '<div class="mini-back-body"><div class="mini-back-row"><span class="mini-back-lbl">CA observations</span><span class="mini-back-val">' + d.ca.toLocaleString() + '</span></div>' + backNotes + '</div>' +
        '</div>' +
      '</div>' +
    '</div>'
  );
}

function tryExt(img, slug) {
  var exts = ['png', 'webp'];
  var src = img.src;
  for (var i = 0; i < exts.length; i++) {
    if (src.indexOf('.' + exts[i]) < 0 && (i === 0 || src.indexOf('.' + exts[i - 1]) >= 0)) {
      var j = i;
      img.onerror = j < exts.length - 1
        ? function() { tryExt(img, slug); }
        : function() { img.style.display = 'none'; img.nextElementSibling.style.display = 'flex'; };
      img.src = 'photos/' + slug + '.' + exts[i];
      return;
    }
  }
  img.style.display = 'none';
  img.nextElementSibling.style.display = 'flex';
}

/* ===== TILE CLICK (delegated) ===== */
document.getElementById('mini-grid').addEventListener('click', function(e) {
  var scene = e.target.closest('.mini-scene');
  if (scene) scene.classList.toggle('flipped');
});

/* ===== INIT ===== */
window.addEventListener('DOMContentLoaded', function() {
  buildRegionChips();
  setRegionChipStyles(null);
  positionBodyWrap();

  // File input
  document.getElementById('fi').addEventListener('change', function() {
    var file = this.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(e) { loadCSV(e.target.result); };
    reader.readAsText(file);
    this.value = '';
  });


  // Month chips
  document.querySelectorAll('#month-chips [data-m]').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var m = parseInt(btn.getAttribute('data-m'));
      if (m === 0) {
        activeMonths = [0];
      } else {
        var idx = activeMonths.indexOf(m);
        if (idx >= 0) { activeMonths.splice(idx, 1); }
        else { activeMonths = activeMonths.filter(function(x) { return x !== 0; }); activeMonths.push(m); }
        if (!activeMonths.length) activeMonths = [0];
      }
      document.querySelectorAll('#month-chips [data-m]').forEach(function(c) {
        var mv = parseInt(c.getAttribute('data-m'));
        c.classList.toggle('on', activeMonths.indexOf(0) >= 0 ? mv === 0 : activeMonths.indexOf(mv) >= 0);
      });
      render();
    });
  });
});
window.addEventListener('load', positionBodyWrap);
window.addEventListener('resize', positionBodyWrap);

// Try auto-loading data.csv (works when served from a local file server)
(function() {
  var xhr = new XMLHttpRequest();
  xhr.open('GET', 'data.csv');
  xhr.onload = function() { if (xhr.status === 200) loadCSV(xhr.responseText); };
  xhr.onerror = function() {};
  try { xhr.send(); } catch(e) {}
})();

function imgFail(img) { tryExt(img, img.getAttribute('data-slug') || ''); }
} // end initApp
