<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CA Nature Tracker — Regions</title>
<link rel="icon" type="image/png" href="spanishshawl_favicon.png">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --ink:#1e2820;--ink-mid:#4a5548;--ink-light:#8a9488;
  --cream:#f8f6f1;--white:#ffffff;
  --border:rgba(30,40,32,0.10);--border-strong:rgba(30,40,32,0.20);
  --shadow:0 1px 8px rgba(30,40,32,0.07);--shadow-hover:0 5px 24px rgba(30,40,32,0.13);
  --radius:14px;--radius-sm:8px;
}
.cat-lizards           {--c1:#9AA65A;--c2:#C6D29A;--c3:#E8F0D4;--cd:#5a6a32;}
.cat-mammals           {--c1:#8A7362;--c2:#BBA99B;--c3:#E8DDD4;--cd:#4e3f34;}
.cat-butterflies       {--c1:#8B6E98;--c2:#C5B3D6;--c3:#EAE3F2;--cd:#5a4268;}
.cat-frogs-toads       {--c1:#6E8F5E;--c2:#A7C39A;--c3:#D8EDD0;--cd:#3e5e30;}
.cat-flowering-plants  {--c1:#A16B7A;--c2:#CDA2AD;--c3:#F0DDE2;--cd:#6a3a48;}
.cat-sea-stars         {--c1:#C46D48;--c2:#E29A7A;--c3:#F5DDD0;--cd:#7a3e20;}
.cat-birds             {--c1:#C46D48;--c2:#E29A7A;--c3:#F5DDD0;--cd:#7a3e20;}
.cat-snakes            {--c1:#C2A98B;--c2:#E1D3BB;--c3:#F2EBD8;--cd:#6a5840;}
.cat-newts-salamanders {--c1:#4F7F72;--c2:#9EC9BF;--c3:#D0EDE8;--cd:#264f45;}
.cat-moths             {--c1:#64686C;--c2:#B0B3B6;--c3:#E2E4E6;--cd:#36393c;}
.cat-turtles           {--c1:#4B7E8E;--c2:#93C1CC;--c3:#D0E8EE;--cd:#224e5e;}
.cat-nudibranchs       {--c1:#D1A53B;--c2:#EBCB77;--c3:#F7EBC8;--cd:#8a6410;}
.cat-dragonflies       {--c1:#5D6A9E;--c2:#A5AED6;--c3:#DDE0F2;--cd:#323e72;}
.cat-damselflies       {--c1:#6E8FB8;--c2:#B1C7DF;--c3:#DAE9F4;--cd:#3a5e88;}
.cat-default           {--c1:#64686C;--c2:#B0B3B6;--c3:#E2E4E6;--cd:#36393c;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--cream);color:var(--ink);display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.header{background:var(--ink);padding:18px 28px;display:flex;align-items:center;gap:14px;flex-shrink:0;}
.header h1{font-family:Georgia,"Times New Roman",serif;font-size:20px;font-weight:400;color:#9aa87a;white-space:nowrap;}
.hcounts{font-size:11px;color:#6a7a68;letter-spacing:.04em;text-transform:uppercase;flex:1;}
.hdr-toggle{display:flex;gap:3px;background:rgba(0,0,0,0.2);border-radius:8px;padding:3px;}
.htog{font-size:11px;font-weight:500;padding:5px 12px;border-radius:6px;border:none;background:transparent;color:#7aA07a;cursor:pointer;letter-spacing:.02em;transition:all .15s;}
.htog:hover{background:rgba(255,255,255,0.07);color:#a8c4a0;}
.htog.on{background:rgba(255,255,255,0.12);color:#c4dcc0;}
.nav-btn{font-size:11px;font-weight:500;padding:5px 12px;border-radius:99px;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.7);cursor:pointer;white-space:nowrap;transition:all .15s;letter-spacing:.02em;text-decoration:none;display:inline-block;font-family:inherit;}
.nav-btn:hover{background:rgba(255,255,255,0.16);color:#fff;border-color:rgba(255,255,255,0.35);}
.toolbar{background:var(--white);border-bottom:1px solid var(--border);padding:0 28px;flex-shrink:0;}
.trow{display:flex;flex-wrap:wrap;gap:7px;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);}
.trow:last-child{border-bottom:none;}
.fl{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.07em;color:var(--ink-light);white-space:nowrap;margin-right:2px;}
.cscroll{display:flex;gap:5px;flex-wrap:wrap;}
.chip{font-size:11px;font-weight:500;padding:3px 11px;border-radius:99px;border:1px solid var(--border-strong);background:var(--cream);color:var(--ink-mid);cursor:pointer;transition:all .15s;white-space:nowrap;font-family:inherit;}
.chip:hover{border-color:#A8947E;color:#8a7060;}
.chip.on{background:#A8947E;color:#fff;border-color:#A8947E;}
.body-wrap{display:flex;flex:1;overflow:hidden;min-height:0;}
.map-panel{width:380px;flex-shrink:0;border-right:1px solid var(--border);background:var(--white);overflow-y:auto;}
.map-canvas-wrap{padding:10px 10px 0;}
.map-canvas-wrap canvas{display:block;width:100%;height:auto;aspect-ratio:1060/1188;cursor:crosshair;border-radius:var(--radius-sm);}
.map-footer{padding:8px 10px 16px;}
.region-detail{height:100%;}
.rd-placeholder{font-size:11px;color:var(--ink-light);font-style:italic;}
.rd-name{font-family:Georgia,"Times New Roman",serif;font-size:13px;font-weight:600;color:var(--ink);margin-bottom:8px;line-height:1.3;}
.rd-section{margin-bottom:8px;}
.rd-label{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-light);margin-bottom:3px;}
.rd-text{font-size:10.5px;color:var(--ink-mid);line-height:1.5;}
.map-label{font-size:11px;color:var(--ink-mid);min-height:16px;line-height:1.4;}
.map-label strong{color:var(--ink);}
.map-clear{margin-top:5px;font-size:11px;color:var(--ink-light);background:none;border:1px solid var(--border-strong);border-radius:99px;padding:2px 9px;cursor:pointer;display:none;font-family:inherit;}
.map-clear:hover{color:var(--ink);border-color:var(--ink-mid);}
.tile-panel{flex:1;overflow-y:auto;padding:14px 18px 60px;min-width:0;}
.rbar{padding:0 0 10px;font-size:11px;color:var(--ink-light);display:flex;align-items:center;gap:10px;}
.rbar strong{color:var(--ink);}
.mini-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:11px;}
.none-msg{grid-column:1/-1;text-align:center;padding:50px 20px;color:var(--ink-light);}
.none-msg h3{font-family:Georgia,"Times New Roman",serif;font-size:17px;font-weight:400;font-style:italic;margin-bottom:6px;color:var(--ink-mid);}
.none-msg p{font-size:12px;line-height:1.5;}
.mini-scene{height:178px;perspective:800px;cursor:pointer;}
.mini-inner{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:transform .45s cubic-bezier(.4,0,.2,1);box-shadow:var(--shadow);border-radius:10px;}
.mini-scene:hover .mini-inner{box-shadow:var(--shadow-hover);}
.mini-scene.flipped .mini-inner{transform:rotateY(180deg);}
.mini-face{position:absolute;width:100%;height:100%;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:10px;overflow:hidden;border:.5px solid rgba(0,0,0,.12);display:flex;flex-direction:column;background:var(--white);}
.mini-back{transform:rotateY(180deg);}
.mini-hdr{padding:6px 8px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;background:var(--c2);}
.mini-name{font-size:10.5px;font-weight:500;color:var(--cd);line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;flex:1;padding-right:4px;}
.mini-chk{width:17px;height:17px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;color:#fff;background:var(--c1);flex-shrink:0;}
.mini-chk.unseen{background:rgba(255,255,255,.55);border:1.5px solid var(--c1);color:transparent;}
.mini-photo{flex:1;overflow:hidden;min-height:0;}
.mini-photo img{width:100%;height:100%;object-fit:cover;display:block;}
.mini-initials{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:var(--c1);font-size:20px;font-weight:500;color:rgba(255,255,255,.9);}
.mini-obs{padding:5px 8px;display:flex;align-items:center;gap:4px;flex-shrink:0;background:var(--c3);}
.mini-reg-txt{font-size:10px;font-weight:500;color:var(--cd);white-space:nowrap;}
.mini-peak-pill{font-size:10px;font-weight:500;color:var(--cd);background:var(--c2);border-radius:10px;padding:1px 6px;line-height:1.4;white-space:nowrap;}
.mini-back-body{flex:1;padding:8px;display:flex;flex-direction:column;gap:6px;background:var(--c3);min-height:0;}
.mini-back-row{display:flex;justify-content:space-between;align-items:center;}
.mini-back-lbl{font-weight:500;font-size:10px;color:var(--cd);}
.mini-back-val{font-size:10.5px;color:var(--cd);opacity:.8;}
.mini-divider{border:none;border-top:.5px solid rgba(0,0,0,.12);margin:0;}
.mini-notes{font-size:9.5px;color:var(--cd);opacity:.85;line-height:1.4;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden;}
</style>

const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const imgBase=document.getElementById('img-base');
const imgLines=document.getElementById('img-lines');
const imgClick=document.getElementById('img-click');
const fillImgs=FILLS.map(b64=>{
  if(!b64)return null;
  const i=new Image();i.src='data:image/png;base64,'+b64;return i;
});
const hitC=document.createElement('canvas');
hitC.width=W;hitC.height=H;
const hitCtx=hitC.getContext('2d',{willReadFrequently:true});
let clickData=null,loaded=0;
const activeSet=new Set();
function onLoad(){
  if(++loaded<3)return;
  hitCtx.drawImage(imgClick,0,0,W,H);
  const raw=hitCtx.getImageData(0,0,W,H).data;
  clickData=new Uint8Array(W*H);
  for(let i=0;i<W*H;i++)clickData[i]=raw[i*4];
  redraw();
}
imgBase.onload=onLoad;imgLines.onload=onLoad;imgClick.onload=onLoad;
if(imgBase.complete)onLoad();if(imgLines.complete)onLoad();if(imgClick.complete)onLoad();
function redraw(){
  ctx.drawImage(imgBase,0,0,W,H);
  activeSet.forEach(idx=>{
    const fi=fillImgs[idx];
    if(fi&&fi.complete)ctx.drawImage(fi,0,0,W,H);
    else if(fi)fi.onload=()=>redraw();
  });
  ctx.drawImage(imgLines,0,0,W,H);
}
function getAt(ex,ey){
  if(!clickData)return null;
  const r=canvas.getBoundingClientRect();
  const ix=Math.floor((ex-r.left)*W/r.width);
  const iy=Math.floor((ey-r.top)*H/r.height);
  if(ix<0||ix>=W||iy<0||iy>=H)return null;
  const v=clickData[iy*W+ix];return v===255?null:v;
}
function toggleRegion(idx){
  if(activeSet.has(idx))activeSet.delete(idx);else activeSet.add(idx);
  redraw();
}

canvas.addEventListener('click',e=>{
  const idx=getAt(e.clientX,e.clientY);
  if(idx!==null)toggleRegion(idx);
});

/* ===== OVERRIDE Jepson toggleRegion for single-select + chip sync ===== */
var _jepsonToggle = toggleRegion;
toggleRegion = function(idx) {
  var wasActive = activeSet.has(idx);
  activeSet.clear();
  if (!wasActive) activeSet.add(idx);
  redraw();
  var code = null;
  for (var i = 0; i < REGIONS.length; i++) {
    if (REGIONS[i].idx === idx) { code = REGIONS[i].code; break; }
  }
  applyRegion(wasActive ? null : code, false);
};

/* ===== BUILD REGION CHIPS ===== */
function buildRegionChips() {
  var container = document.getElementById('region-chips');
  container.innerHTML = '';

  var allBtn = document.createElement('button');
  allBtn.className = 'chip on';
  allBtn.setAttribute('data-region', '__a__');
  allBtn.textContent = 'All';
  allBtn.addEventListener('click', function() { applyRegion(null, true); });
  container.appendChild(allBtn);

  JEPSON_REGIONS.forEach(function(r) {
    var btn = document.createElement('button');
    btn.className = 'chip';
    btn.setAttribute('data-region', r.code);
    btn.setAttribute('data-color', r.color);
    btn.textContent = r.code;
    btn.title = r.name;
    btn.addEventListener('click', function() {
      var isOn = btn.classList.contains('on');
      applyRegion(isOn ? null : r.code, true);
    });
    container.appendChild(btn);
  });
}

function setRegionChipStyles(activeCode) {
  document.querySelectorAll('#region-chips [data-region]').forEach(function(c) {
    var cr = c.getAttribute('data-region');
    var color = c.getAttribute('data-color');
    var isOn = activeCode === null ? cr === '__a__' : cr === activeCode;
    c.classList.toggle('on', isOn);
    if (isOn && color) {
      c.style.background = color;
      c.style.borderColor = color;
      c.style.color = '#fff';
    } else {
      c.style.background = '';
      c.style.borderColor = '';
      c.style.color = '';
    }
  });
}

var activeRegion = null;

function applyRegion(code, syncMap) {
  activeRegion = code;

  // Update region chips
  setRegionChipStyles(code);

  // Update map label and clear button
  if (code) {
    var rObj = null;
    for (var i = 0; i < JEPSON_REGIONS.length; i++) {
      if (JEPSON_REGIONS[i].code === code) { rObj = JEPSON_REGIONS[i]; break; }
    }
    var info = REGION_INFO[code];
    if (info) {
      document.getElementById('rd-name').textContent = info.name;
      document.getElementById('rd-makeup').textContent = info.makeup;
      document.getElementById('rd-sites').textContent = info.sites;
      document.getElementById('rd-placeholder').style.display = 'none';
      document.getElementById('rd-content').style.display = 'block';
    }
    if (syncMap && rObj) {
      activeSet.clear();
      activeSet.add(rObj.idx);
      redraw();
    }
  } else {
    document.getElementById('rd-placeholder').style.display = '';
    document.getElementById('rd-content').style.display = 'none';
    if (syncMap) { activeSet.clear(); redraw(); }
  }
  render();
}

/* ===== DATA & FILTERS ===== */
var MONTHS = ['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
var CAT_CLASS = {
  'lizards':'cat-lizards','mammals':'cat-mammals','butterflies':'cat-butterflies',
  'frogs & toads':'cat-frogs-toads','flowering plants':'cat-flowering-plants',
  'flowers':'cat-flowering-plants','sea stars':'cat-sea-stars','birds':'cat-birds',
  'snakes':'cat-snakes','newts & salamanders':'cat-newts-salamanders',
  'salamanders':'cat-newts-salamanders','moths':'cat-moths',
  'turtles & tortoises':'cat-turtles','turtles':'cat-turtles',
  'nudibranchs':'cat-nudibranchs','dragonflies':'cat-dragonflies','damselflies':'cat-damselflies'
};
function getCatClass(cat) { return CAT_CLASS[(cat || '').toLowerCase()] || 'cat-default'; }

var allData = [];
var activeCats = ['__a__'];
var activeMonths = [0];

function normCat(cat) {
  return cat.toLowerCase() === 'flowering plants' ? 'Flowers' : cat;
}

function splitCSVRow(line) {
  var out = [], cur = '', inQ = false;
  for (var i = 0; i < line.length; i++) {
    var ch = line[i];
    if (ch === '"') { inQ = !inQ; }
    else if (ch === ',' && !inQ) { out.push(cur); cur = ''; }
    else { cur += ch; }
  }
  out.push(cur);
  return out;
}

function parseCSV(txt) {
  var lines = txt.split(/\r?\n/);
  if (lines.length < 2) return [];
  var heads = splitCSVRow(lines[0]).map(function(h) { return h.trim().toLowerCase(); });
  function col() {
    var names = Array.prototype.slice.call(arguments);
    for (var n = 0; n < names.length; n++) {
      for (var i = 0; i < heads.length; i++) {
        if (heads[i].indexOf(names[n].toLowerCase()) >= 0) return i;
      }
    }
    return -1;
  }
  var iCat=col('category'), iSub=col('subcategory'), iNm=col('name');
  var iSci=col('scientific name'), iDt=col('life list date');
  var iCA=col('ca obsv'), iReg=col('region'), iRP=col('regional peak'), iNo=col('notes');
  var rows = [];
  for (var i = 1; i < lines.length; i++) {
    var c = splitCSVRow(lines[i]);
    var name = iNm >= 0 ? (c[iNm] || '').trim() : '';
    if (!name) continue;
    var dv = iDt >= 0 ? (c[iDt] || '').trim() : '';
    var seen = !!(dv && dv !== '#N/A' && dv !== 'N/A');
    var ca = parseInt(((iCA >= 0 ? c[iCA] : '') || '0').replace(/,/g, '')) || 0;
    var regCode = iReg >= 0 ? (c[iReg] || '').trim() : '';
    var rpRaw = iRP >= 0 ? (c[iRP] || '').trim() : '';
    var rpNum = parseInt(rpRaw);
    var regPeak = (rpNum >= 1 && rpNum <= 12) ? rpNum : 0;
    rows.push({
      cat: normCat(iCat >= 0 ? (c[iCat] || '').trim() : ''),
      sub: iSub >= 0 ? (c[iSub] || '').trim() : '',
      name: name, sci: iSci >= 0 ? (c[iSci] || '').trim() : '',
      seen: seen, date: seen ? dv : '', ca: ca,
      region: regCode, regPeak: regPeak,
      notes: iNo >= 0 ? (c[iNo] || '').trim() : ''
    });
  }
  return rows;
}

function loadCSV(txt) {
  allData = parseCSV(txt);
  buildCatChips();
  document.getElementById('rbar').style.display = 'flex';
  var seen = allData.filter(function(d) { return d.seen; }).length;
  var _hc = document.getElementById('hc'); if(_hc) _hc.textContent = seen + ' observed &middot; ' + (allData.length - seen) + ' targets';
  render();
}

/* ===== CAT CHIPS ===== */
function buildCatChips() {
  var seen = {}, cats = [];
  allData.forEach(function(d) { if (!seen[d.cat]) { seen[d.cat] = true; cats.push(d.cat); } });
  cats.sort();
  var container = document.getElementById('cat-chips');
  container.innerHTML = '';
  var allBtn = document.createElement('button');
  allBtn.className = 'chip' + (activeCats.indexOf('__a__') >= 0 ? ' on' : '');
  allBtn.setAttribute('data-cat', '__a__');
  allBtn.textContent = 'All';
  allBtn.addEventListener('click', function() { toggleCat(allBtn); });
  container.appendChild(allBtn);
  cats.forEach(function(cat) {
    var btn = document.createElement('button');
    btn.className = 'chip' + (activeCats.indexOf(cat) >= 0 ? ' on' : '');
    btn.setAttribute('data-cat', cat);
    btn.textContent = cat;
    btn.addEventListener('click', function() { toggleCat(btn); });
    container.appendChild(btn);
  });
}

function toggleCat(btn) {
  var cat = btn.getAttribute('data-cat');
  if (cat === '__a__') {
    activeCats = ['__a__'];
  } else {
    var idx = activeCats.indexOf(cat);
    if (idx >= 0) { activeCats.splice(idx, 1); }
    else { activeCats = activeCats.filter(function(c) { return c !== '__a__'; }); activeCats.push(cat); }
    if (!activeCats.length) activeCats = ['__a__'];
  }
  document.querySelectorAll('#cat-chips [data-cat]').forEach(function(c) {
    var cv = c.getAttribute('data-cat');
    c.classList.toggle('on', activeCats.indexOf('__a__') >= 0 ? cv === '__a__' : activeCats.indexOf(cv) >= 0);
  });
  render();
}

/* ===== RENDER ===== */
var activeToggle = 'all';
function setToggle(val) {
  activeToggle = val;
  ['all','seen','unseen'].forEach(function(k) {
    var b = document.getElementById('tog-' + k);
    if (b) b.classList.toggle('on', k === val);
  });
  render();
}

function render() {
  var f = allData.filter(function(d) {
    if (activeCats.indexOf('__a__') < 0 && activeCats.indexOf(d.cat) < 0) return false;
    if (activeRegion && d.region !== activeRegion) return false;
    if (activeMonths.indexOf(0) < 0 && (!d.regPeak || activeMonths.indexOf(d.regPeak) < 0)) return false;
    if (activeToggle === 'seen' && !d.seen) return false;
    if (activeToggle === 'unseen' && d.seen) return false;
    return true;
  });
  f.sort(function(a, b) { return (b.ca || 0) - (a.ca || 0); });
  document.getElementById('rbar').style.display = allData.length ? 'flex' : 'none';
  document.getElementById('rtxt').innerHTML =
    'Showing <strong>' + f.length + '</strong> of ' + allData.length + ' species'
    + (activeRegion ? ' in <strong>' + activeRegion + '</strong>' : '');
  var grid = document.getElementById('mini-grid');
  if (!allData.length) {
    grid.innerHTML = '<div class="none-msg"><h3>Load your CSV to get started</h3><p>Click <strong>Load CSV</strong> in the header.</p></div>';
    return;
  }
  if (!f.length) {
    grid.innerHTML = '<div class="none-msg"><h3>Nothing matches these filters.</h3><p>Try a different region or category.</p></div>';
    return;
  }
  var html = '';
  for (var i = 0; i < f.length; i++) html += makeMiniTile(f[i]);
  grid.innerHTML = html;
}

/* ===== MINI TILE ===== */
function makeMiniTile(d) {
  var catcl = getCatClass(d.cat);
  var slug = d.name.toLowerCase().replace(/[\u2018\u2019']/g, '').replace(/[^a-z0-9]+/g, '_').replace(/^_|_$/g, '');
  var ini = d.name.split(' ').slice(0, 2).map(function(w) { return (w[0] || '').toUpperCase(); }).join('');
  var chkCl = d.seen ? '' : ' unseen';
  var chkTxt = d.seen ? '&#10003;' : '';
  var obsRow = d.region
    ? '<span class="mini-reg-txt">' + d.region + ' peak:</span><span class="mini-peak-pill">' + (d.regPeak ? MONTHS[d.regPeak] : '&mdash;') + '</span>'
    : '';
  var backNotes = d.notes
    ? '<hr class="mini-divider"><div class="mini-back-lbl" style="margin-bottom:2px">Notes</div><div class="mini-notes">' + d.notes + '</div>'
    : '';
  return (
    '<div class="mini-scene ' + catcl + '">' +
      '<div class="mini-inner">' +
        '<div class="mini-face">' +
          '<div class="mini-hdr"><span class="mini-name">' + d.name + '</span><span class="mini-chk' + chkCl + '">' + chkTxt + '</span></div>' +
          '<div class="mini-photo"><img src="photos/' + slug + '.jpg" onerror="imgFail(this)" data-slug="' + slug + '" style="width:100%;height:100%;object-fit:cover;display:block"><div class="mini-initials" style="display:none">' + ini + '</div></div>' +
          '<div class="mini-obs">' + obsRow + '</div>' +
        '</div>' +
        '<div class="mini-face mini-back">' +
          '<div class="mini-hdr"><span class="mini-name">' + d.name + '</span><span class="mini-chk' + chkCl + '">' + chkTxt + '</span></div>' +
          '<div class="mini-back-body"><div class="mini-back-row"><span class="mini-back-lbl">CA observations</span><span class="mini-back-val">' + d.ca.toLocaleString() + '</span></div>' + backNotes + '</div>' +
        '</div>' +
      '</div>' +
    '</div>'
  );
}

function tryExt(img, slug) {
  var exts = ['png', 'webp'];
  var src = img.src;
  for (var i = 0; i < exts.length; i++) {
    if (src.indexOf('.' + exts[i]) < 0 && (i === 0 || src.indexOf('.' + exts[i - 1]) >= 0)) {
      var j = i;
      img.onerror = j < exts.length - 1
        ? function() { tryExt(img, slug); }
        : function() { img.style.display = 'none'; img.nextElementSibling.style.display = 'flex'; };
      img.src = 'photos/' + slug + '.' + exts[i];
      return;
    }
  }
  img.style.display = 'none';
  img.nextElementSibling.style.display = 'flex';
}

/* ===== TILE CLICK (delegated) ===== */
document.getElementById('mini-grid').addEventListener('click', function(e) {
  var scene = e.target.closest('.mini-scene');
  if (scene) scene.classList.toggle('flipped');
});

/* ===== INIT ===== */
window.addEventListener('DOMContentLoaded', function() {
  buildRegionChips();
  setRegionChipStyles(null);
  positionBodyWrap();

  // File input
  document.getElementById('fi').addEventListener('change', function() {
    var file = this.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(e) { loadCSV(e.target.result); };
    reader.readAsText(file);
    this.value = '';
  });


  // Month chips
  document.querySelectorAll('#month-chips [data-m]').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var m = parseInt(btn.getAttribute('data-m'));
      if (m === 0) {
        activeMonths = [0];
      } else {
        var idx = activeMonths.indexOf(m);
        if (idx >= 0) { activeMonths.splice(idx, 1); }
        else { activeMonths = activeMonths.filter(function(x) { return x !== 0; }); activeMonths.push(m); }
        if (!activeMonths.length) activeMonths = [0];
      }
      document.querySelectorAll('#month-chips [data-m]').forEach(function(c) {
        var mv = parseInt(c.getAttribute('data-m'));
        c.classList.toggle('on', activeMonths.indexOf(0) >= 0 ? mv === 0 : activeMonths.indexOf(mv) >= 0);
      });
      render();
    });
  });
});
window.addEventListener('load', positionBodyWrap);
window.addEventListener('resize', positionBodyWrap);
