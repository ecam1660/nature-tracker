<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nature Tracker — Photo Prep</title>
<link rel="icon" type="image/png" href="spanishshawl_favicon.png">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink: #1e2820;
  --mid: #4a5548;
  --light: #8a9488;
  --cream: #f5f2ec;
  --white: #ffffff;
  --green: #5a6a32;
  --green-light: #C6D29A;
  --green-pale: #e8f0d4;
  --border: rgba(30,40,32,0.12);
  --border-strong: rgba(30,40,32,0.22);
  --shadow: 0 2px 12px rgba(30,40,32,0.08);
  --shadow-lg: 0 8px 32px rgba(30,40,32,0.14);
  --radius: 12px;
  --radius-sm: 7px;
}

body {
  font-family: Georgia, 'Times New Roman', serif;
  background: var(--cream);
  color: var(--ink);
  min-height: 100vh;
}

header {
  background: var(--ink);
  padding: 20px 40px;
  display: flex;
  align-items: center;
  gap: 14px;
}
header h1 {
  font-size: 19px;
  font-weight: 400;
  color: #9aa87a;
  letter-spacing: 0.01em;
}
header p {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 11px;
  color: #5a6a48;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  flex: 1;
}
.nav-btn {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 11px; font-weight: 500;
  padding: 5px 12px; border-radius: 99px;
  border: 1px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.7);
  cursor: pointer; white-space: nowrap; transition: all 0.15s;
  letter-spacing: 0.02em; text-decoration: none; display: inline-block;
  margin-left: auto;
}
.nav-btn:hover { background: rgba(255,255,255,0.16); color: white; border-color: rgba(255,255,255,0.35); }

.main { max-width: 900px; margin: 0 auto; padding: 36px 24px 80px; }

/* Drop zone */
.dropzone {
  border: 2px dashed var(--border-strong);
  border-radius: var(--radius);
  background: var(--white);
  padding: 48px 32px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  margin-bottom: 32px;
  position: relative;
}
.dropzone:hover, .dropzone.over {
  border-color: var(--green);
  background: var(--green-pale);
}
.dropzone svg {
  width: 40px; height: 40px;
  stroke: var(--green); fill: none; stroke-width: 1.5;
  stroke-linecap: round; stroke-linejoin: round;
  margin-bottom: 14px;
}
.dropzone h2 {
  font-size: 18px; font-weight: 400;
  color: var(--ink); margin-bottom: 6px;
}
.dropzone p {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 12px; color: var(--light); line-height: 1.6;
}
.dropzone p strong { color: var(--mid); }
#file-input { display: none; }

/* Controls bar */
.controls {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.controls-label {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 10px; font-weight: 500;
  text-transform: uppercase; letter-spacing: 0.07em;
  color: var(--light);
}
.btn {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 12px; font-weight: 500;
  padding: 7px 16px; border-radius: 99px;
  border: 1px solid var(--border-strong);
  background: var(--white); color: var(--mid);
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
}
.btn:hover { border-color: var(--green); color: var(--green); }
.btn.primary {
  background: var(--green); color: white; border-color: var(--green);
}
.btn.primary:hover { background: var(--ink); border-color: var(--ink); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.count-badge {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 11px; color: var(--light); margin-left: auto;
}

/* Queue */
.queue { display: flex; flex-direction: column; gap: 10px; }

.item {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 12px 14px;
  box-shadow: var(--shadow);
  transition: box-shadow 0.15s;
}
.item:hover { box-shadow: var(--shadow-lg); }
.item.done { border-left: 3px solid var(--green); opacity: 0.75; }
.item.error { border-left: 3px solid #c46d48; }

.thumb {
  width: 56px; height: 56px;
  border-radius: var(--radius-sm);
  object-fit: cover;
  flex-shrink: 0;
  background: var(--cream);
  border: 1px solid var(--border);
}

.item-info { flex: 1; min-width: 0; }
.item-original {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 10px; color: var(--light);
  margin-bottom: 5px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.name-row {
  display: flex; align-items: center; gap: 8px;
}
.name-input {
  flex: 1;
  font-family: Georgia, 'Times New Roman', serif;
  font-size: 13px; color: var(--ink);
  border: 1px solid var(--border-strong);
  border-radius: var(--radius-sm);
  padding: 5px 9px;
  background: var(--cream);
  outline: none;
  transition: border-color 0.15s;
  min-width: 0;
}
.name-input:focus { border-color: var(--green); background: white; }
.name-input::placeholder { color: var(--light); font-style: italic; }

.slug-preview {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 10px; color: var(--light);
  margin-top: 4px;
  font-style: italic;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.slug-preview span { color: var(--green); }

.item-size {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 10px; color: var(--light);
  white-space: nowrap; text-align: right; flex-shrink: 0;
}
.size-arrow { color: var(--green); margin: 0 3px; }

.dl-btn {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 11px; font-weight: 500;
  padding: 5px 12px; border-radius: 99px;
  border: 1px solid var(--border-strong);
  background: var(--cream); color: var(--mid);
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
  flex-shrink: 0;
}
.dl-btn:hover { border-color: var(--green); color: var(--green); background: var(--green-pale); }
.dl-btn.ready { background: var(--green-pale); border-color: var(--green); color: var(--green); }
.dl-btn.processing { color: var(--light); cursor: default; }

.remove-btn {
  width: 22px; height: 22px;
  border-radius: 50%;
  border: 1px solid var(--border-strong);
  background: none; color: var(--light);
  cursor: pointer; font-size: 14px; line-height: 1;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: all 0.15s;
}
.remove-btn:hover { border-color: #c46d48; color: #c46d48; background: #f5ddd0; }

.empty {
  text-align: center; padding: 40px;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 13px; color: var(--light);
}

/* Download all progress */
.dl-all-wrap {
  margin-top: 24px;
  padding: 16px 20px;
  background: var(--green-pale);
  border: 1px solid var(--green-light);
  border-radius: var(--radius);
  display: none;
  align-items: center;
  gap: 12px;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 12px; color: var(--green);
}
.dl-all-wrap.show { display: flex; }

.validation-msg {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 10px; margin-top: 3px; line-height: 1.4;
}
.validation-msg.ok   { color: var(--green); }
.validation-msg.warn { color: #c46d48; }
.validation-msg.info { color: var(--light); font-style: italic; }
.name-input.valid   { border-color: var(--green) !important; }
.name-input.invalid { border-color: #c46d48 !important; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>

<header>
  <h1>California Nature Tracker</h1>
  <p>Photo Prep Tool</p>
  <a class="nav-btn" href="index.html">&#8592; Tracker</a>
</header>

<div class="main">

  <div class="dropzone" id="dropzone" onclick="document.getElementById('file-input').click()">
    <svg viewBox="0 0 48 48">
      <rect x="6" y="10" width="36" height="28" rx="3"/>
      <circle cx="18" cy="22" r="4"/>
      <path d="M6 32l10-8 8 7 6-5 12 9"/>
    </svg>
    <h2>Drop photos here</h2>
    <p>Add as many as you want, in any order, any size.<br>
    <strong>JPG, PNG, WebP</strong> all accepted. Then type the species name for each one.</p>
    <input type="file" id="file-input" accept="image/*" multiple onchange="addFiles(this.files)">
  </div>

  <div class="controls" id="controls" style="display:none">
    <span class="controls-label">Target size</span>
    <select id="target-size" style="font-family:-apple-system,sans-serif;font-size:12px;padding:6px 9px;border:1px solid var(--border-strong);border-radius:var(--radius-sm);background:var(--cream);color:var(--ink);outline:none;">
      <option value="200">200 KB</option>
      <option value="150">150 KB</option>
      <option value="100">100 KB</option>
      <option value="300">300 KB</option>
    </select>
    <button class="btn primary" onclick="processAll()">&#8595; Resize &amp; name all</button>
    <button class="btn" onclick="downloadAll()" id="dl-all-btn" disabled>&#8628; Download all</button>
    <button class="btn" onclick="clearDownloaded()" id="clear-btn" style="display:none">&#10005; Clear downloaded</button>
    <button class="btn" onclick="clearAll()" id="clear-all-btn" style="display:none">Clear all</button>
    <span class="count-badge" id="count-badge"></span>
  </div>

  <div class="queue" id="queue">
    <div class="empty" id="empty-msg" style="display:none">No photos added yet.</div>
  </div>

  <div class="dl-all-wrap" id="dl-progress">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
    <span id="dl-progress-text">Building zip…</span>
  </div>

</div>

var SPECIES_LOWER = SPECIES.map(function(n){ return n.toLowerCase(); });

function findMatch(input) {
  var q = input.trim().toLowerCase();
  if (!q) return null;
  // Exact match
  var exact = SPECIES_LOWER.indexOf(q);
  if (exact >= 0) return { type: 'exact', name: SPECIES[exact] };
  // Fuzzy: find all that include the query string
  var partial = [];
  for (var i = 0; i < SPECIES_LOWER.length; i++) {
    if (SPECIES_LOWER[i].indexOf(q) >= 0) partial.push(SPECIES[i]);
  }
  if (partial.length === 1) return { type: 'partial', name: partial[0] };
  if (partial.length > 1) return { type: 'multiple', names: partial.slice(0, 4) };
  return { type: 'none' };
}

var items = [];
var idCounter = 0;

var dz = document.getElementById('dropzone');
dz.addEventListener('dragover', function(e){ e.preventDefault(); dz.classList.add('over'); });
dz.addEventListener('dragleave', function(){ dz.classList.remove('over'); });
dz.addEventListener('drop', function(e){
  e.preventDefault(); dz.classList.remove('over');
  addFiles(e.dataTransfer.files);
});

function addFiles(files) {
  var arr = Array.prototype.slice.call(files);
  arr.forEach(function(file) {
    if (!file.type.match(/^image\//)) return;
    var id = ++idCounter;
    var item = { id: id, file: file, name: '', blob: null, outSize: null };
    items.push(item);
    renderItem(item);
  });
  document.getElementById('controls').style.display = items.length ? 'flex' : 'none';
  updateBadge();
}

function toSlug(name) {
  return name
    .toLowerCase()
    .replace(/['\u2019\u2018]/g, '')
    .replace(/[^a-z0-9]+/g, '_')
    .replace(/^_|_$/g, '');
}

function formatBytes(b) {
  if (b < 1024) return b + ' B';
  if (b < 1024*1024) return Math.round(b/1024) + ' KB';
  return (b/1024/1024).toFixed(1) + ' MB';
}

function renderItem(item) {
  var queue = document.getElementById('queue');
  var div = document.createElement('div');
  div.className = 'item';
  div.id = 'item-' + item.id;

  var img = document.createElement('img');
  img.className = 'thumb';
  img.alt = '';
  var reader = new FileReader();
  reader.onload = function(e){ img.src = e.target.result; };
  reader.readAsDataURL(item.file);

  var info = document.createElement('div');
  info.className = 'item-info';

  var orig = document.createElement('div');
  orig.className = 'item-original';
  orig.textContent = item.file.name + ' \u00b7 ' + formatBytes(item.file.size);

  var nameRow = document.createElement('div');
  nameRow.className = 'name-row';

  var input = document.createElement('input');
  input.type = 'text';
  input.className = 'name-input';
  input.placeholder = 'Type species name\u2026 e.g. Flame Skimmer';
  input.id = 'name-' + item.id;
  input.addEventListener('input', function(){
    item.name = input.value;
    item.blob = null; // reset on name change
    updateSlugPreview(item);
    validateName(item, input);
    updateDlBtn(item);
  });
  input.addEventListener('keydown', function(e){
    if (e.key === 'Enter') {
      // focus next empty input
      var empties = document.querySelectorAll('.name-input');
      var found = false;
      for (var i = 0; i < empties.length; i++) {
        if (found && !empties[i].value) { empties[i].focus(); break; }
        if (empties[i] === input) found = true;
      }
    }
  });

  nameRow.appendChild(input);

  var slugDiv = document.createElement('div');
  slugDiv.className = 'slug-preview';
  slugDiv.id = 'slug-' + item.id;
  slugDiv.innerHTML = 'filename: <span>type a name above</span>';

  var validDiv = document.createElement('div');
  validDiv.className = 'validation-msg';
  validDiv.id = 'valid-' + item.id;

  info.appendChild(orig);
  info.appendChild(nameRow);
  info.appendChild(slugDiv);
  info.appendChild(validDiv);

  var sizeDiv = document.createElement('div');
  sizeDiv.className = 'item-size';
  sizeDiv.id = 'size-' + item.id;

  var dlBtn = document.createElement('button');
  dlBtn.className = 'dl-btn';
  dlBtn.id = 'dl-' + item.id;
  dlBtn.textContent = 'Save';
  dlBtn.onclick = function(){ downloadItem(item); };

  var rmBtn = document.createElement('button');
  rmBtn.className = 'remove-btn';
  rmBtn.innerHTML = '&times;';
  rmBtn.title = 'Remove';
  rmBtn.onclick = function(){ removeItem(item.id); };

  div.appendChild(img);
  div.appendChild(info);
  div.appendChild(sizeDiv);
  div.appendChild(dlBtn);
  div.appendChild(rmBtn);

  queue.appendChild(div);
}

function validateName(item, input) {
  var el = document.getElementById('valid-' + item.id);
  if (!el) return;
  var q = item.name.trim();
  if (!q) {
    el.textContent = '';
    input.classList.remove('valid', 'invalid');
    return;
  }
  var result = findMatch(q);
  el.innerHTML = '';
  if (result.type === 'exact') {
    el.className = 'validation-msg ok';
    el.textContent = '✓ Matched: ' + result.name;
    input.classList.add('valid');
    input.classList.remove('invalid');
  } else if (result.type === 'partial') {
    el.className = 'validation-msg info';
    el.textContent = 'Did you mean: ';
    var link = document.createElement('strong');
    link.textContent = result.name;
    link.style.cssText = 'color:var(--green);cursor:pointer';
    link.onclick = (function(n){ return function(){ applyName(item.id, n); }; })(result.name);
    el.appendChild(link);
    el.appendChild(document.createTextNode('?'));
    input.classList.remove('valid', 'invalid');
  } else if (result.type === 'multiple') {
    el.className = 'validation-msg info';
    el.textContent = 'Matches: ';
    for (var i = 0; i < result.names.length; i++) {
      var link = document.createElement('strong');
      link.textContent = result.names[i];
      link.style.cssText = 'color:var(--green);cursor:pointer;margin-right:6px';
      link.onclick = (function(n){ return function(){ applyName(item.id, n); }; })(result.names[i]);
      el.appendChild(link);
    }
    input.classList.remove('valid', 'invalid');
  } else {
    el.className = 'validation-msg warn';
    el.textContent = '⚠ No match — check spelling';
    input.classList.add('invalid');
    input.classList.remove('valid');
  }
}

function applyName(id, name) {
  var item = null;
  for (var i = 0; i < items.length; i++) { if (items[i].id === id) { item = items[i]; break; } }
  if (!item) return;
  item.name = name;
  var input = document.getElementById('name-' + id);
  if (input) input.value = name;
  updateSlugPreview(item);
  validateName(item, input);
  updateDlBtn(item);
}

function updateSlugPreview(item) {
  var el = document.getElementById('slug-' + item.id);
  if (!el) return;
  if (!item.name.trim()) {
    var orig = item.file.name.replace(/\.[^.]+$/, '');
    var fallback = toSlug(orig);
    el.innerHTML = 'filename: <span>' + fallback + '.jpg</span> <span style="color:var(--light);font-style:italic;">(original name)</span>';
  } else {
    var slug = toSlug(item.name.trim());
    el.innerHTML = 'filename: <span>' + slug + '.jpg</span>';
  }
}

function updateDlBtn(item) {
  var btn = document.getElementById('dl-' + item.id);
  if (!btn) return;
  if (item.blob) {
    btn.className = 'dl-btn ready';
    btn.textContent = '\u2193 Save';
  } else {
    btn.className = 'dl-btn';
    btn.textContent = 'Save';
  }
}

function removeItem(id) {
  items = items.filter(function(x){ return x.id !== id; });
  var el = document.getElementById('item-' + id);
  if (el) el.remove();
  document.getElementById('controls').style.display = items.length ? 'flex' : 'none';
  updateBadge();
  checkAllDone();
  updateClearBtns();
}

function updateBadge() {
  var b = document.getElementById('count-badge');
  if (!items.length) { b.textContent = ''; return; }
  var done = items.filter(function(x){ return x.blob; }).length;
  b.textContent = done + ' of ' + items.length + ' ready';
}

function checkAllDone() {
  var allDone = items.length > 0 && items.every(function(x){ return x.blob; });
  document.getElementById('dl-all-btn').disabled = !allDone;
  updateClearBtns();
}

function processItem(item, targetKB, callback) {
  var targetBytes = targetKB * 1024;
  var reader = new FileReader();
  reader.onload = function(e) {
    var img = new Image();
    img.onload = function() {
      compressToTarget(img, item.file.size, targetBytes, function(blob) {
        item.blob = blob;
        item.outSize = blob.size;

        var sizeEl = document.getElementById('size-' + item.id);
        if (sizeEl) {
          sizeEl.innerHTML =
            formatBytes(item.file.size) +
            '<span class="size-arrow"> \u2192 </span>' +
            formatBytes(blob.size);
        }
        var el = document.getElementById('item-' + item.id);
        if (el) el.classList.add('done');

        updateDlBtn(item);
        updateBadge();
        checkAllDone();
        if (callback) callback();
      });
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(item.file);
}

function compressToTarget(img, origSize, targetBytes, callback) {
  // Already small enough — just convert format, preserve quality
  if (origSize <= targetBytes) {
    renderCanvas(img, img.width, img.height, 0.92, callback);
    return;
  }

  // Step 1: estimate how much we need to shrink by pixel count
  // JPEG size scales roughly linearly with pixel count at a given quality
  var pixels = img.width * img.height;
  var targetPixels = pixels * (targetBytes / origSize) * 1.4; // 1.4 fudge for JPEG efficiency
  var scale = Math.min(1.0, Math.sqrt(targetPixels / pixels));
  var w = Math.max(400, Math.round(img.width * scale));
  var h = Math.max(400, Math.round(img.height * scale));

  // Step 2: encode at quality 0.82 — a good general target
  renderCanvas(img, w, h, 0.82, function(blob1) {
    if (blob1.size <= targetBytes) { callback(blob1); return; }

    // Step 3: if still too big, one more size reduction and lower quality
    var scale2 = Math.sqrt(targetBytes / blob1.size) * 0.92;
    var w2 = Math.max(300, Math.round(w * scale2));
    var h2 = Math.max(300, Math.round(h * scale2));
    var q2 = blob1.size > targetBytes * 2 ? 0.70 : 0.76;
    renderCanvas(img, w2, h2, q2, function(blob2) {
      // Pick whichever is under target; if both over, pick smaller
      if (blob2.size <= targetBytes) { callback(blob2); return; }
      callback(blob2);
    });
  });
}

function renderCanvas(img, w, h, quality, callback) {
  var canvas = document.createElement('canvas');
  canvas.width = w; canvas.height = h;
  var ctx = canvas.getContext('2d');
  ctx.drawImage(img, 0, 0, w, h);
  canvas.toBlob(function(blob){ callback(blob); }, 'image/jpeg', quality);
}

// ── Process all ──────────────────────────────────────────────────────────────

function processAll() {
  var targetKB = parseInt(document.getElementById('target-size').value);
  var pending = items.filter(function(x){ return !x.blob; });
  if (!pending.length) { downloadAll(); return; }

  // Process up to 6 concurrently for speed
  var idx = 0;
  var active = 0;
  var concurrency = 6;

  function runNext() {
    while (active < concurrency && idx < pending.length) {
      var item = pending[idx++];
      active++;
      processItem(item, targetKB, function() {
        active--;
        runNext();
      });
    }
  }
  runNext();
}

// ── Download ─────────────────────────────────────────────────────────────────

function downloadItem(item) {
  var targetKB = parseInt(document.getElementById('target-size').value);
  if (item.blob) {
    triggerDownload(item);
  } else {
    var btn = document.getElementById('dl-' + item.id);
    if (btn) { btn.className = 'dl-btn processing'; btn.textContent = 'Processing\u2026'; }
    processItem(item, targetKB, function(){ triggerDownload(item); });
  }
}

function getSlugForItem(item) {
  var name = item.name.trim();
  if (name) return toSlug(name);
  var orig = item.file.name.replace(/\.[^.]+$/, '');
  return toSlug(orig);
}

function triggerDownload(item) {
  var slug = getSlugForItem(item);
  var filename = slug + '.jpg';
  var url = URL.createObjectURL(item.blob);
  var a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  setTimeout(function(){ URL.revokeObjectURL(url); }, 2000);
}

function downloadAll() {
  var ready = items.filter(function(x){ return x.blob; });
  if (!ready.length) return;

  var prog = document.getElementById('dl-progress');
  var txt = document.getElementById('dl-progress-text');
  prog.className = 'dl-all-wrap show';
  txt.textContent = 'Building zip file…';

  var zip = new JSZip();

  ready.forEach(function(item) {
    var slug = getSlugForItem(item);
    var filename = slug + '.jpg';
    zip.file(filename, item.blob);
  });

  zip.generateAsync({ type: 'blob' }).then(function(zipBlob) {
    var url = URL.createObjectURL(zipBlob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'nature-tracker-photos.zip';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function(){ URL.revokeObjectURL(url); }, 3000);
    txt.textContent = '✓ Done! ' + ready.length + ' photos in nature-tracker-photos.zip — unzip and move to your photos/ folder.';
  });
}
function clearDownloaded() {
  var remaining = [];
  for (var i = 0; i < items.length; i++) {
    if (items[i].blob) {
      var el = document.getElementById('item-' + items[i].id);
      if (el) el.remove();
    } else {
      remaining.push(items[i]);
    }
  }
  items = remaining;
  document.getElementById('dl-progress').className = 'dl-all-wrap';
  updateBadge();
  checkAllDone();
  updateClearBtns();
  document.getElementById('controls').style.display = items.length ? 'flex' : 'none';
}

function clearAll() {
  items = [];
  document.getElementById('queue').innerHTML = '';
  document.getElementById('dl-progress').className = 'dl-all-wrap';
  updateBadge();
  document.getElementById('controls').style.display = 'none';
  updateClearBtns();
}

function updateClearBtns() {
  var hasDone   = items.some(function(x){ return !!x.blob; });
  var hasAny    = items.length > 0;
  var clearDl   = document.getElementById('clear-btn');
  var clearAll2 = document.getElementById('clear-all-btn');
  if (clearDl)   clearDl.style.display   = hasDone ? 'inline-block' : 'none';
  if (clearAll2) clearAll2.style.display = hasAny  ? 'inline-block' : 'none';
}

</script>
